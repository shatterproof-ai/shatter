name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ts:
    name: Build TypeScript frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: shatter-ts/package-lock.json

      - name: Install and bundle
        working-directory: shatter-ts
        run: npm ci && npm run bundle

      - name: Stage TS bundle
        run: |
          mkdir -p staging-ts
          cp shatter-ts/dist/bundle.js staging-ts/
          cp shatter-ts/dist/worker-bundle.js staging-ts/

      - uses: actions/upload-artifact@v4
        with:
          name: shatter-ts
          path: staging-ts/
          if-no-files-found: error

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli-build-tool: cargo
            artifact-name: shatter-linux-x86_64
            cli-binary: target/x86_64-unknown-linux-gnu/release/shatter
            rust-binary: shatter-rust/target/x86_64-unknown-linux-gnu/release/shatter-rust
            go-os: linux
            go-arch: amd64
            go-binary: shatter-go

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cli-build-tool: cross
            artifact-name: shatter-linux-aarch64
            cli-binary: target/aarch64-unknown-linux-gnu/release/shatter
            rust-binary: shatter-rust/target/aarch64-unknown-linux-gnu/release/shatter-rust
            go-os: linux
            go-arch: arm64
            go-binary: shatter-go

          - target: x86_64-apple-darwin
            os: macos-13
            cli-build-tool: cargo
            artifact-name: shatter-macos-x86_64
            cli-binary: target/x86_64-apple-darwin/release/shatter
            rust-binary: shatter-rust/target/x86_64-apple-darwin/release/shatter-rust
            go-os: darwin
            go-arch: amd64
            go-binary: shatter-go

          - target: aarch64-apple-darwin
            os: macos-latest
            cli-build-tool: cargo
            artifact-name: shatter-macos-aarch64
            cli-binary: target/aarch64-apple-darwin/release/shatter
            rust-binary: shatter-rust/target/aarch64-apple-darwin/release/shatter-rust
            go-os: darwin
            go-arch: arm64
            go-binary: shatter-go

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cli-build-tool: cargo
            artifact-name: shatter-windows-x86_64
            cli-binary: target/x86_64-pc-windows-msvc/release/shatter.exe
            rust-binary: shatter-rust/target/x86_64-pc-windows-msvc/release/shatter-rust.exe
            go-os: windows
            go-arch: amd64
            go-binary: shatter-go.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            shatter-rust/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux' && matrix.cli-build-tool == 'cargo'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install cross
        if: matrix.cli-build-tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install z3

      - uses: actions/setup-go@v5
        with:
          go-version-file: shatter-go/go.mod
          cache-dependency-path: shatter-go/go.sum

      - name: Create staging directory
        shell: bash
        run: mkdir -p staging

      - name: Build shatter CLI (cargo)
        if: matrix.cli-build-tool == 'cargo'
        run: cargo build --release --target ${{ matrix.target }} -p shatter-cli

      - name: Build shatter CLI (cross)
        if: matrix.cli-build-tool == 'cross'
        run: cross build --release --target ${{ matrix.target }} -p shatter-cli

      - name: Stage shatter CLI
        shell: bash
        env:
          CLI_BINARY: ${{ matrix.cli-binary }}
        run: cp "$CLI_BINARY" staging/

      - name: Build shatter-rust frontend (cargo)
        if: matrix.cli-build-tool == 'cargo'
        working-directory: shatter-rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build shatter-rust frontend (cross)
        if: matrix.cli-build-tool == 'cross'
        working-directory: shatter-rust
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage shatter-rust frontend
        shell: bash
        env:
          RUST_BINARY: ${{ matrix.rust-binary }}
        run: cp "$RUST_BINARY" staging/

      - name: Build shatter-go frontend
        working-directory: shatter-go
        env:
          GOOS: ${{ matrix.go-os }}
          GOARCH: ${{ matrix.go-arch }}
          CGO_ENABLED: '0'
          GO_BINARY: ${{ matrix.go-binary }}
        run: go build -o "../staging/$GO_BINARY" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: staging/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-ts, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate release tag
        id: tag
        run: echo "tag=build-$(date -u '+%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package archives
        shell: bash
        run: |
          cd artifacts
          for dir in shatter-linux-x86_64 shatter-linux-aarch64 shatter-macos-x86_64 shatter-macos-aarch64; do
            mkdir -p "$dir/shatter-ts"
            cp shatter-ts/bundle.js "$dir/shatter-ts/"
            cp shatter-ts/worker-bundle.js "$dir/shatter-ts/"
            tar czf "${dir}.tar.gz" -C "$dir" .
          done
          mkdir -p shatter-windows-x86_64/shatter-ts
          cp shatter-ts/bundle.js shatter-windows-x86_64/shatter-ts/
          cp shatter-ts/worker-bundle.js shatter-windows-x86_64/shatter-ts/
          (cd shatter-windows-x86_64 && zip -r ../shatter-windows-x86_64.zip .)

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$REPO" \
            --title "Build $RELEASE_TAG" \
            --generate-notes \
            artifacts/shatter-linux-x86_64.tar.gz \
            artifacts/shatter-linux-aarch64.tar.gz \
            artifacts/shatter-macos-x86_64.tar.gz \
            artifacts/shatter-macos-aarch64.tar.gz \
            artifacts/shatter-windows-x86_64.zip
