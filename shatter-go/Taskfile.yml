version: '3'

tasks:
  build:
    desc: Build Go frontend
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - bin/shatter-go
    cmds:
      # `go build ./...` stays: packages outside main's dep graph (e.g.
      # reconstruct/) get compile coverage ONLY here in CI, which runs
      # build via parity/conformance deps but never go:vet/go:test. With a
      # warm GOCACHE the follow-up -o build reuses everything.
      - go build -buildvcs=false ./...
      - go build -buildvcs=false -o bin/shatter-go .

  test:
    desc: Run Go tests
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
      - ../protocol/schemas/**/*.json
      - ../protocol/fixtures/**/*.json
      - ../protocol/registry.yaml
      - ../shatter-core/src/protocol.rs
    cmds:
      # 30m > Go's 10m default: under the shared-machine caps (GOFLAGS=-p=4,
      # str-35vtk.5) the compile-heavy e2e packages can exceed 10m when other
      # suites run concurrently. Governance trades speed for machine
      # usability; the timeout must not turn that into a failure.
      - go test -timeout 30m ./...

  vet:
    desc: Run go vet
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    preconditions:
      - sh: command -v golangci-lint
        msg: golangci-lint not installed (optional)
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    cmds:
      - golangci-lint run ./...
