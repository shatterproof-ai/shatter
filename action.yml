name: 'Shatter'
description: 'Automatic exploratory testing via concolic execution'

branding:
  icon: 'zap'
  color: 'purple'

inputs:
  build:
    description: 'Exact continuous build tag to install'
    required: false
  channel:
    description: 'Release channel to resolve when build is not set'
    required: false
    default: 'continuous'
  install-dir:
    description: 'Directory to place the shatter binary'
    required: false
    default: ''

outputs:
  shatter-path:
    description: 'Path to the installed shatter binary'
    value: ${{ steps.install.outputs.shatter-path }}
  version:
    description: 'Installed shatter --version output'
    value: ${{ steps.install.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Install Shatter
      id: install
      shell: bash
      run: |
        set -euo pipefail
        install_dir="${{ inputs.install-dir }}"
        if [ -z "$install_dir" ]; then
          install_dir="${RUNNER_TEMP}/shatter/bin"
        fi
        export INSTALL_DIR="$install_dir"
        export CHANNEL="${{ inputs.channel }}"
        if [ -n "${{ inputs.build }}" ]; then
          export BUILD="${{ inputs.build }}"
        fi

        bash "${{ github.action_path }}/install.sh"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        echo "shatter-path=$INSTALL_DIR/shatter" >> "$GITHUB_OUTPUT"
        echo "version=$("$INSTALL_DIR/shatter" --version)" >> "$GITHUB_OUTPUT"
