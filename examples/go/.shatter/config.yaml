# Shatter project configuration for Go examples
#
# Place a `.shatter/` directory in your Go module root.
# Shatter discovers config files by walking upward from each target file.
#
# Copy this file as a starting point for your own Go project.

# ── Global defaults ──────────────────────────────────────────────────────
defaults:
  max_iterations: 100
  timeout: 60

# ── Per-function overrides ───────────────────────────────────────────────
# Keys are "relative/path.go:FunctionName" patterns (globs supported).
functions:
  # Simple function — fewer iterations are sufficient
  "01-arithmetic.go:ClassifyNumber":
    max_iterations: 50
    inputs: ./inputs/ClassifyNumber/candidates.json

  # Complex nested control flow — needs more iterations
  "04-nested-control-flow.go:ClassifyHttpResponse":
    max_iterations: 300
    timeout: 120

  # Complex state machine — needs more iterations
  "04-nested-control-flow.go:ProcessStateMachine":
    max_iterations: 400

  # Skip test files — they are not exploration targets
  "*_test.go:*":
    skip: true

  # External dependency example — override auto-mock defaults for specific symbols.
  # By default, Shatter generates sensible stubs for os (filesystem), net/http
  # (network), and database/sql (database) calls. Use `mocks` to customize.
  "06-external-deps.go:LoadConfigFile":
    mocks:
      os.ReadFile:
        return_values: ['config_data']   # return a known config string

# ── Global mock overrides ──────────────────────────────────────────────
# Applied to ALL functions unless a per-function `mocks` section overrides them.
#
# defaults:
#   mocks:
#     sql.Query:
#       return_values: [{"rows": []}]
#       behavior: repeat_last      # repeat_last | passthrough
#     os.ReadFile:
#       return_values: ["default content"]
