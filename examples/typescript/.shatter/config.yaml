# Shatter project configuration for TypeScript examples
#
# Place a `.shatter/` directory alongside your source code.
# Shatter discovers config files by walking upward from each target file;
# the nearest config wins when settings conflict.
#
# Copy this file as a starting point for your own project.

# ── Global defaults ──────────────────────────────────────────────────────
# These apply to every function unless overridden below.
defaults:
  max_iterations: 100        # exploration iterations per function
  timeout: 60                # seconds before a single exploration times out

  # Run a setup file before exploration to initialize shared state (e.g. DB).
  # The setup() return value is passed as setup_context to each execute call.
  # teardown() is called after exploration completes.
  setup: ./setup/global.ts
  setup_mode: per_function

  # Type-name generators: map a type name to a file exporting a function
  # of the same name that returns a seed value for that type.
  generators:
    UserProfile: ./generators/user.ts

  # Param-name generators: map a parameter name to a file exporting a
  # function of the same name that returns a seed value for that parameter.
  param_generators:
    authToken: ./generators/token.ts

# ── Per-function overrides ───────────────────────────────────────────────
# Keys are "relative/path.ts:functionName" patterns (globs supported).
functions:
  # Skip functions that depend entirely on opaque types (database connections,
  # sockets) — Shatter cannot generate meaningful inputs for these.
  "src/11-opaque-types.ts:processWithDbConnection":
    skip: true
  "src/11-opaque-types.ts:processWithSocket":
    skip: true

  # Skip generated code with a glob pattern
  "src/generated/**":
    skip: true

  # External dependency example — override auto-mock defaults for specific symbols.
  # By default, Shatter generates sensible stubs for fs, network, and database calls.
  # Use `mocks` to provide custom return values or change behavior.
  "src/12-external-deps.ts:loadConfig":
    mocks:
      existsSync:
        return_values: [true]       # always pretend the file exists
      readFileSync:
        return_values: ['{"key": "value"}']   # return a known JSON string

# ── Global mock overrides ──────────────────────────────────────────────
# Applied to ALL functions unless a per-function `mocks` section overrides them.
# Useful for project-wide stubs (e.g., always mock your database client).
#
# defaults:
#   mocks:
#     query:
#       return_values: [{"rows": [{"id": 1, "name": "test"}]}]
#       behavior: repeat_last      # repeat_last | passthrough
#     fetch:
#       return_values: [{"status": 200, "data": {"ok": true}}]
