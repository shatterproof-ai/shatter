# Shatter Walkthrough Manifest
# Single source of truth for the compact demo (8-15 steps).
# Consumed by demo/walkthrough.sh (local) and demo/walkthrough-docker.sh (Docker).
#
# Target references (targets, targets_first) resolve against
# benchmarks/sample-manifest.json at runtime via load_sample_group().
#
# To add or remove a walkthrough step, edit this file only — both runners
# pick up the change automatically.

steps:
  - id: analyze-ts
    title: "Analyze TypeScript Functions"
    description: "Discover parameters, types, and branch conditions"
    command: "explore --analyze-only"
    targets: walkthrough.typescript
    language: typescript

  - id: explore-ts
    title: "Explore TypeScript Functions"
    description: "Concolic execution: generate inputs to cover all branches"
    command: "explore"
    args: ["--max-iterations", "20", "--timeout-explore", "15"]
    targets: walkthrough.typescript
    language: typescript

  - id: scan-ts
    title: "Scan Standalone TypeScript"
    description: "Scan a directory of standalone TypeScript files"
    command: "scan"
    args: ["examples/standalone/ts"]
    language: typescript

  - id: analyze-go
    title: "Analyze Go Functions"
    description: "Discover parameters, types, and branch conditions in Go code"
    command: "explore --analyze-only"
    targets: walkthrough.go
    language: go

  - id: explore-go
    title: "Explore Go Functions"
    description: "Concolic execution on Go: generate inputs to cover all branches"
    command: "explore"
    args: ["--max-iterations", "3", "--timeout-explore", "25"]
    targets: walkthrough.go
    language: go

  - id: analyze-rust
    title: "Analyze Rust Functions"
    description: "Discover parameters, types, and branch conditions in Rust code"
    command: "explore --analyze-only"
    targets: walkthrough.rust
    language: rust

  - id: explore-rust
    title: "Explore Rust Functions"
    description: "Concolic execution on Rust: generate inputs to cover all branches"
    command: "explore"
    args: ["--max-iterations", "3", "--timeout-explore", "25"]
    targets: walkthrough.rust
    language: rust

  - id: concolic-z3
    title: "Concolic Exploration (Z3)"
    description: "Use the Z3-backed concolic explorer to solve branch constraints"
    command: "explore --concolic"
    args: ["--max-iterations", "20", "--timeout-explore", "15"]
    targets_first: walkthrough.typescript
    language: typescript

  - id: spec-generation
    title: "Behavioral Specification"
    description: "Generate a behavioral spec with equivalence classes and pre/postconditions"
    command: "explore --spec"
    args: ["--max-iterations", "20", "--timeout-explore", "15"]
    targets_first: walkthrough.typescript
    language: typescript

  - id: test-dry-run
    title: "Test Impact Analysis (Dry Run)"
    description: "Show which tests would run for changed files without executing them"
    command: "test --dry-run"
    working_dir: tia_demo

  - id: properties
    title: "Properties Export"
    description: "Discover and export behavioral properties and invariants"
    command: "properties"
    targets_first: walkthrough.typescript
    language: typescript
