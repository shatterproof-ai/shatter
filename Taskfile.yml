version: '3'

includes:
  core:
    taskfile: ./shatter-core/Taskfile.yml
    dir: ./shatter-core
  cli:
    taskfile: ./shatter-cli/Taskfile.yml
    dir: ./shatter-cli
  ts:
    taskfile: ./shatter-ts/Taskfile.yml
    dir: ./shatter-ts
  go:
    taskfile: ./shatter-go/Taskfile.yml
    dir: ./shatter-go
  rust-fe:
    taskfile: ./shatter-rust/Taskfile.yml
    dir: ./shatter-rust
  rust-rt:
    taskfile: ./shatter-rust-runtime/Taskfile.yml
    dir: ./shatter-rust-runtime

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # --- Build (issue 2/4) ---

  build:
    desc: Build everything (Rust + TS + Go)
    deps: [core:build, cli:build, ts:build, go:build, rust-fe:build, rust-rt:build]

  build-rust:
    desc: Build all Rust crates
    deps: [core:build, cli:build, rust-fe:build, rust-rt:build]

  build-examples:
    desc: Build example targets
    sources:
      - scripts/examples_checkout.py
    cmds:
      - |
        examples_root="$(python3 scripts/examples_checkout.py)"
        cargo build --manifest-path "$examples_root/rust/Cargo.toml"
      - |
        examples_root="$(python3 scripts/examples_checkout.py --no-update)"
        cargo build --manifest-path "$examples_root/generators/wasm-rust/Cargo.toml"
      - |
        examples_root="$(python3 scripts/examples_checkout.py --no-update)"
        cargo build --manifest-path "$examples_root/generators/wasm-adversarial/Cargo.toml"

  # --- Test aggregation (issue 4) ---

  test:
    desc: Run all tests (all languages)
    deps: [core:test, cli:test, ts:test, go:test, rust-fe:test, rust-rt:test]

  test-quick:
    desc: "Quick: cargo workspace tests only"
    deps: [core:test, cli:test]

  test-standard:
    desc: "Standard: cargo tests + clippy"
    deps: [core:test, cli:test, core:clippy, cli:clippy]

  lint:
    desc: Run all linters
    deps: [core:clippy, cli:clippy, rust-fe:clippy, rust-rt:clippy, go:vet]

  check-fast:
    desc: "Fast quality gate (pre-push: clippy + tests + TS + Go)"
    deps: [core:clippy, cli:clippy, core:test-ignored, cli:test, ts:test, go:test]

  # --- Cross-cutting quality (issue 5) ---

  schemas:
    desc: Validate protocol schemas against fixtures
    preconditions:
      - sh: command -v python3
        msg: "python3 not installed — skipping schema validation"
      - sh: python3 -c "import jsonschema" 2>/dev/null
        msg: "jsonschema not installed (pip install jsonschema)"
    sources:
      - protocol/schemas/**/*.json
      - protocol/schemas/**/*.py
      - protocol/fixtures/**/*.json
      - protocol/registry.yaml
    cmds:
      - python3 protocol/schemas/test_schema_validation.py

  # NOTE: `parity` is defined once, below (registry validation + codegen check
  # + validate-parity + golden tests). A second, narrower definition that only
  # ran validate-parity.py used to shadow-precede it and was dead (go-task
  # uses the last definition); removed in str-35vtk.3.

  conformance:
    desc: Run protocol conformance tests across all frontends
    deps: [ts:build, go:build, rust-fe:build]
    preconditions:
      - sh: command -v python3
        msg: "python3 not installed"
      - sh: python3 -c "import yaml" 2>/dev/null
        msg: "pyyaml not installed (pip install pyyaml)"
    sources:
      - protocol/**/*
      - shatter-ts/src/**/*.ts
      - shatter-go/**/*.go
      - shatter-rust/src/**/*.rs
    cmds:
      - python3 protocol/conformance/conformance_harness.py

  parity:
    desc: Validate frontend feature parity (registry consistency + capability contract)
    deps: [ts:build, go:build, rust-fe:build]
    preconditions:
      - sh: command -v python3
        msg: "python3 not installed"
    sources:
      - protocol/registry.yaml
      - protocol/conformance/golden_cases.yaml
      - protocol/conformance/golden/**/*
      - protocol/generated/manifest.json
      - scripts/validate-protocol-registry.py
      - scripts/protocol-codegen.py
      - shatter-ts/src/**/*.ts
      - shatter-go/**/*.go
      - shatter-rust/src/**/*.rs
    cmds:
      - python3 scripts/validate-protocol-registry.py
      - python3 scripts/protocol-codegen.py --check
      - |
        if [ -f scripts/validate-parity.py ]; then
          python3 scripts/validate-parity.py
        else
          echo "[skip] validate-parity.py not present (pending str-7jgm.2)"
        fi
      - python3 protocol/conformance/run_golden_tests.py

  protocol-codegen-check:
    desc: "Verify generated protocol artifacts are in sync with protocol/registry.yaml"
    preconditions:
      - sh: command -v python3
        msg: "python3 not installed"
      - sh: python3 -c "import yaml" 2>/dev/null
        msg: "pyyaml not installed (pip install pyyaml)"
    sources:
      - protocol/registry.yaml
      - protocol/generated/manifest.json
      - scripts/protocol-codegen.py
      - scripts/test_protocol_codegen.py
    cmds:
      - python3 scripts/protocol-codegen.py --check
      - python3 -m unittest scripts.test_protocol_codegen

  golden-test:
    desc: Run cross-frontend parity golden tests (compare capabilities and outputs against recorded expectations)
    deps: [ts:build, go:build, rust-fe:build]
    preconditions:
      - sh: command -v python3
        msg: "python3 not installed"
      - sh: python3 -c "import yaml" 2>/dev/null
        msg: "pyyaml not installed (pip install pyyaml)"
    sources:
      - protocol/conformance/golden_cases.yaml
      - protocol/conformance/golden/**/*
      - protocol/registry.yaml
      - shatter-ts/src/**/*.ts
      - shatter-go/**/*.go
      - shatter-rust/src/**/*.rs
    cmds:
      - python3 protocol/conformance/run_golden_tests.py

  docs:
    desc: Run documentation quality checks
    sources:
      - "*.md"
      - docs/**/*
    cmds:
      - |
        test -f README.md || { echo "missing README.md"; exit 1; }
        test -f AGENTS.md || { echo "missing AGENTS.md"; exit 1; }
        test -f CLAUDE.md || { echo "missing CLAUDE.md"; exit 1; }
        test -d docs || { echo "missing docs/"; exit 1; }
        echo "[ok] core documentation files present"
      - |
        if command -v markdownlint-cli2 >/dev/null 2>&1; then
          markdownlint-cli2 --config .markdownlint-cli2.yaml \
            README.md AGENTS.md CLAUDE.md PLAN.md SPEC.md PROTOCOL.md PARITY.md docs
        else echo "[skip] markdownlint-cli2 not installed"; fi
      - |
        if command -v vale >/dev/null 2>&1; then
          vale README.md AGENTS.md CLAUDE.md PLAN.md SPEC.md PROTOCOL.md PARITY.md docs
        else echo "[skip] vale not installed"; fi
      - |
        if command -v lychee >/dev/null 2>&1; then
          lychee --config lychee.toml --no-progress \
            README.md AGENTS.md CLAUDE.md PLAN.md SPEC.md PROTOCOL.md PARITY.md docs
        else echo "[skip] lychee not installed"; fi

  meta:
    desc: Run repository meta checks (workflow lint, Semgrep)
    sources:
      - .github/workflows/**/*.yml
      - .semgrep/**/*
      - install.sh
      - scripts/test_release_workflow.py
      - scripts/test_install_manifest.py
      - scripts/package_npm_release.py
      - scripts/test_package_npm_release.py
      - scripts/retention_continuous_releases.py
      - scripts/test_retention_continuous_releases.py
    cmds:
      - bash -n install.sh
      - python3 -m unittest scripts.test_release_workflow
      - python3 -m unittest scripts.test_install_manifest
      - python3 -m unittest scripts.test_package_npm_release
      - python3 -m unittest scripts.test_retention_continuous_releases
      - cd shatter-go-tool && go test ./...
      - |
        if [ -d .github/workflows ] && command -v actionlint >/dev/null 2>&1; then
          actionlint
        else echo "[skip] actionlint not installed or no workflows"; fi
      - |
        cfg="${SEMGREP_CONFIG:-.semgrep/shatter.yml}"
        if [ -f "$cfg" ] && command -v semgrep >/dev/null 2>&1; then
          semgrep --config "$cfg" .
        else echo "[skip] semgrep not installed or no config"; fi

  tooling:
    desc: Report available required and optional tools
    cmds:
      - |
        echo "==> Required"
        for t in git cargo node npm go; do
          command -v "$t" >/dev/null && echo "  [ok] $t" || { echo "  [MISSING] $t"; exit 1; }
        done
        echo "==> Optional"
        for t in bd semgrep pre-commit reviewdog actionlint lychee vale markdownlint-cli2 golangci-lint staticcheck govulncheck cargo-nextest cargo-deny cargo-udeps; do
          command -v "$t" >/dev/null && echo "  [ok] $t" || echo "  [--] $t"
        done

  check:
    desc: "Full quality suite (staged fail-fast: static -> unit -> integration)"
    cmds:
      - task: check-static
      - task: check-unit
      - task: check-integration

  check-static:
    desc: "check stage 1: cheap static analysis and docs/meta lint"
    deps:
      - core:clippy
      - cli:clippy
      - rust-fe:clippy
      - rust-rt:clippy
      - schemas
      - docs
      - meta

  check-unit:
    desc: "check stage 2: unit test suites (nested-build suites serialized last)"
    deps:
      - rust-rt:test
      - ts:test
      - go:test
      - go:vet
    cmds:
      # cli:test and rust-fe:test both spawn nested cargo builds from inside
      # tests (scan pipelines / fixture-crate harnesses). Run in parallel with
      # each other and the deps above they starve those builds past their
      # 60s deadlines (str-35vtk.3 baseline: 13x "build timed out" flakes at
      # loadavg 105). Sequenced here, not parallel deps.
      - task: cli:test
      - task: rust-fe:test

  check-integration:
    desc: "check stage 3: expensive integration (core e2e superset, conformance, parity)"
    deps:
      - core:test-ignored
    cmds:
      - task: conformance
      - task: parity

  # --- E2E, pre-completion, gauntlet, clean (issue 6) ---

  e2e:
    desc: Run E2E concolic pipeline tests (TS + Rust + Go frontends)
    cmds:
      - task: e2e-ts
      - task: e2e-go
      - task: e2e-rust

  e2e-ts:
    desc: "E2E concolic pipeline: TypeScript frontend (e2e_concolic.rs; also uses the prebuilt Go frontend for its Go planner section)"
    deps: [ts:build, go:build]
    sources:
      - shatter-core/tests/e2e_concolic.rs
      - shatter-core/src/**/*.rs
      - shatter-ts/src/**/*.ts
      - shatter-go/**/*.go
      - scripts/examples_checkout.py
    cmds:
      - |
        examples_root="$(python3 scripts/examples_checkout.py)"
        SHATTER_EXAMPLES_DIR="$examples_root" \
          SHATTER_GO_FRONTEND_BIN="{{.ROOT_DIR}}/shatter-go/bin/shatter-go" \
          cargo test --test e2e_concolic

  e2e-go:
    desc: "E2E concolic pipeline: Go frontend (e2e_concolic_go.rs)"
    deps: [go:build]
    sources:
      - shatter-core/tests/e2e_concolic_go.rs
      - shatter-core/src/**/*.rs
      - shatter-go/**/*.go
      - scripts/examples_checkout.py
    cmds:
      - |
        examples_root="$(python3 scripts/examples_checkout.py)"
        SHATTER_EXAMPLES_DIR="$examples_root" \
          SHATTER_GO_FRONTEND_BIN="{{.ROOT_DIR}}/shatter-go/bin/shatter-go" \
          cargo test --test e2e_concolic_go -- --include-ignored

  e2e-rust:
    desc: "E2E concolic pipeline: Rust frontend (e2e_concolic_rust.rs)"
    deps: [rust-fe:build]
    sources:
      - shatter-core/tests/e2e_concolic_rust.rs
      - shatter-core/src/**/*.rs
      - shatter-rust/src/**/*.rs
      - scripts/examples_checkout.py
    cmds:
      - |
        examples_root="$(python3 scripts/examples_checkout.py)"
        SHATTER_EXAMPLES_DIR="$examples_root" cargo test --test e2e_concolic_rust -- --include-ignored

  smoke:
    desc: "Fast pipeline smoke check (~15s). Covers: TS function, Go standalone with func main(), Go library function, failed-instrumentation regression."
    deps: [ts:build]
    # str-gg9v: these steps execute target functions without an OS sandbox, so
    # opt into host execution (targets still run in a throwaway working dir).
    env:
      SHATTER_ALLOW_HOST_WRITES: "1"
    cmds:
      - |
        examples_root="$(python3 scripts/examples_checkout.py)"
        cargo run -p shatter-cli -- explore --max-iterations 3 --timeout-explore 10 "$examples_root/standalone/ts/01-arithmetic.ts:classifyNumber"
      - |
        examples_root="$(python3 scripts/examples_checkout.py --no-update)"
        cargo run -p shatter-cli -- explore --max-iterations 3 --timeout-explore 10 "$examples_root/standalone/go/smoke-main.go:SmokeClassify"
      - |
        examples_root="$(python3 scripts/examples_checkout.py --no-update)"
        cargo run -p shatter-cli -- explore --max-iterations 3 --timeout-explore 10 "$examples_root/standalone/go/01-arithmetic.go:ClassifyNumber"
      - bash scripts/test_empty_report_regression.sh

  pre-completion:
    desc: Pre-completion quality gate (smoke + full check + git status)
    cmds:
      - task: smoke
      - task: check
      - git status --short

  pre-completion-e2e:
    desc: Pre-completion with E2E tests
    cmds:
      - task: check
      - task: e2e
      - git status --short

  walkthrough:
    desc: Run the compact walkthrough demo
    deps: [build]
    # str-gg9v: demo/walkthrough.sh self-exports SHATTER_ALLOW_HOST_WRITES.
    cmds:
      - bash demo/walkthrough.sh --auto --delay 0

  gauntlet:
    desc: Run the broad CLI coverage gauntlet
    deps: [build]
    # str-gg9v: demo/gauntlet.sh self-exports SHATTER_ALLOW_HOST_WRITES.
    cmds:
      - bash demo/gauntlet.sh --auto --delay 0

  broad-run-corpus:
    desc: Run the broad-run validation corpus gate (Kapow failure-class fixtures)
    deps: [cli:build]
    # str-gg9v: scans execute target functions unsandboxed; opt in so the
    # default-deny guard permits execution (writes go to a throwaway working dir).
    env:
      SHATTER_ALLOW_HOST_WRITES: "1"
    preconditions:
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
      - sh: python3 -c "import yaml" 2>/dev/null
        msg: "pyyaml not installed (pip install pyyaml)"
    sources:
      - tests/fixtures/broad-run-corpus/**/*
      - tests/scripts/broad_run_validation.py
    cmds:
      - python3 tests/scripts/broad_run_validation.py

  perf-list:
    desc: List external profiling scenarios
    preconditions:
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_runner.py list

  perf-scenario:
    desc: Run one named external profiling scenario (set SCENARIO=<id>)
    preconditions:
      - sh: test -n "{{.SCENARIO}}"
        msg: "set SCENARIO=<id>"
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_runner.py run --scenario "{{.SCENARIO}}" --results-dir "{{.RESULTS_DIR}}"

  perf-baseline:
    desc: Run the full external profiling corpus
    preconditions:
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_runner.py run --all --results-dir "{{.RESULTS_DIR}}"

  perf-stat-scenario:
    desc: Run one scenario under perf stat (set SCENARIO=<id>)
    preconditions:
      - sh: test -n "{{.SCENARIO}}"
        msg: "set SCENARIO=<id>"
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
      - sh: command -v perf >/dev/null 2>&1
        msg: "perf not installed"
    cmds:
      - python3 scripts/perf_runner.py run --scenario "{{.SCENARIO}}" --profiler perf-stat --results-dir "{{.RESULTS_DIR}}"

  perf-record-scenario:
    desc: Run one scenario under perf record (set SCENARIO=<id>)
    preconditions:
      - sh: test -n "{{.SCENARIO}}"
        msg: "set SCENARIO=<id>"
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
      - sh: command -v perf >/dev/null 2>&1
        msg: "perf not installed"
    cmds:
      - python3 scripts/perf_runner.py run --scenario "{{.SCENARIO}}" --profiler perf-record --results-dir "{{.RESULTS_DIR}}"

  pprof-scenario:
    desc: Run one Go-focused scenario with pprof (set SCENARIO=<id>)
    preconditions:
      - sh: test -n "{{.SCENARIO}}"
        msg: "set SCENARIO=<id>"
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
      - sh: command -v go >/dev/null 2>&1
        msg: "go not installed"
    cmds:
      - python3 scripts/perf_runner.py run --scenario "{{.SCENARIO}}" --profiler pprof --results-dir "{{.RESULTS_DIR}}"

  perf-report:
    desc: Generate markdown and JSON summaries from perf artifacts
    preconditions:
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_report.py --results-dir "{{.RESULTS_DIR}}"

  perf-compare:
    desc: Compare two perf result directories (set BASELINE_DIR and CANDIDATE_DIR)
    preconditions:
      - sh: test -n "{{.BASELINE_DIR}}"
        msg: "set BASELINE_DIR=<dir>"
      - sh: test -n "{{.CANDIDATE_DIR}}"
        msg: "set CANDIDATE_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_compare.py --baseline-dir "{{.BASELINE_DIR}}" --candidate-dir "{{.CANDIDATE_DIR}}"

  perf-ci:
    desc: Run the stable weekly profiling subset and refresh the latest summary
    preconditions:
      - sh: test -n "{{.RESULTS_DIR}}"
        msg: "set RESULTS_DIR=<dir>"
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_runner.py run --scenario-file perf/stable-scenarios.txt --results-dir "{{.RESULTS_DIR}}"
      - python3 scripts/perf_report.py --results-dir "{{.RESULTS_DIR}}"

  perf-isolation:
    desc: Run the isolation mode corpus (set RESULTS_DIR, default .shatter-cache/perf-runs/isolation)
    vars:
      RESULTS_DIR: '{{.RESULTS_DIR | default ".shatter-cache/perf-runs/isolation"}}'
    preconditions:
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_runner.py run --filter 'isolation-' --results-dir "{{.RESULTS_DIR}}"

  perf-isolation-report:
    desc: Generate cross-mode isolation comparison report (set RESULTS_DIR, default .shatter-cache/perf-runs/isolation)
    vars:
      RESULTS_DIR: '{{.RESULTS_DIR | default ".shatter-cache/perf-runs/isolation"}}'
    preconditions:
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
    cmds:
      - python3 scripts/perf_isolation_report.py --results-dir "{{.RESULTS_DIR}}" --markdown-out "{{.RESULTS_DIR}}/isolation-report.md" --json-out "{{.RESULTS_DIR}}/isolation-report.json"

  broad-run-validation:
    desc: "Broad-run validation corpus gate (str-jeen.14). Documented local check; not in CI."
    deps: [cli:build, ts:build, go:build]
    # str-gg9v: scans execute target functions unsandboxed; opt in so the
    # default-deny guard permits execution (writes go to a throwaway working dir).
    env:
      SHATTER_ALLOW_HOST_WRITES: "1"
    preconditions:
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 not installed"
      - sh: python3 -c "import yaml" 2>/dev/null
        msg: "pyyaml not installed (pip install pyyaml)"
    sources:
      - tests/broad-run-corpus/**/*
      - scripts/broad_run_validation_gate.py
      - examples/go/internal-method/**/*
      - examples/go/mixed-package/**/*
      - examples/go/multi-import-wrapper/**/*
      - examples/go/rewrite-syntax/**/*
    cmds:
      - python3 scripts/broad_run_validation_gate.py --corpus tests/broad-run-corpus/manifest.yaml -v

  broad-run-validation-tests:
    desc: "Unit + property tests for the broad-run validation gate"
    cmds:
      - python3 -m unittest scripts.test_broad_run_validation_gate

  kapow-refute-agent:
    desc: "Check the Refute binary available to agents validating Kapow"
    cmds:
      - python3 scripts/kapow_refute_agent.py smoke

  kapow-refute-agent-tests:
    desc: "Unit tests for the Kapow Refute agent wrapper"
    cmds:
      - python3 -m unittest scripts.test_kapow_refute_agent

  clean:
    desc: Remove all build artifacts and checksum cache
    cmds:
      - cargo clean
      - rm -rf shatter-ts/dist shatter-ts/node_modules
      - cd shatter-go && go clean ./...
      - rm -rf .task/
