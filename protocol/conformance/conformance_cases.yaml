# Protocol conformance test cases.
#
# Each case defines a request to send to every frontend and the expected
# response shape. The harness validates:
#   1. Individual shape: required fields present with correct types
#   2. Cross-frontend: after normalizing dynamic_fields, response structures match

# Known drifts that are reported as warnings rather than failures.
# Remove entries as frontends are fixed to align.
known_drifts:
  # Go handler includes a "functions" field in responses where other
  # frontends do not. Tracked for future alignment.
  - pattern: ".functions: missing in"
    reason: "Go handler includes extra 'functions' field in all responses"

  # Side effect capture divergences across frontends.
  # See protocol/parity-matrix.yaml side_effect_capabilities for the full matrix.
  - pattern: "side_effects.*thrown_error"
    reason: "Go does not yet capture thrown_error side effects; only TS emits this kind (see go-side-effects-partial)"
  - pattern: "side_effects.*global_mutation"
    reason: "Go does not yet capture global_mutation side effects; only TS emits this kind (see go-side-effects-partial)"

  # ite SymExpr production divergence: TS produces ite via SSA phi-node merging
  # in data flow analysis. Go and Rust can deserialize ite but do not produce it.
  - pattern: "condition.*ite"
    reason: "Only TS produces ite SymExpr from conditional reassignment; Go/Rust lack data flow tracking (str-4kop)"

  - pattern: "loop_body_states"
    reason: "Only TS currently emits loop_body_states for supported counted loops; Go/Rust only round-trip the field today (str-z0kp.2)"

frontends:
  noop:
    command: ["bash", "protocol/noop-frontend.sh"]
  typescript:
    command: ["node", "--no-warnings", "shatter-ts/dist/main.js"]
    build_check: "shatter-ts/dist/main.js"
  go:
    command: ["shatter-go/bin/shatter-go"]
    build_check: "shatter-go/bin/shatter-go"
  rust:
    command: ["shatter-rust/target/debug/shatter-rust"]
    build_check: "shatter-rust/target/debug/shatter-rust"

cases:
  - name: handshake
    request:
      protocol_version: "0.1.0"
      id: 1
      command: handshake
      capabilities:
        - analyze
        - instrument
        - execute
        - setup
        - teardown
        - generate
    expect:
      status: handshake
      required_fields:
        frontend_version:
          type: string
        language:
          type: string
        capabilities:
          type: array
          min_length: 1
      dynamic_fields:
        - language
        - frontend_version
        - capabilities

  - name: analyze_missing_file
    # noop returns a stub analyze response regardless of file existence
    skip_frontends: [noop]
    request:
      protocol_version: "0.1.0"
      id: 2
      command: analyze
      file: "__nonexistent__/no_such_file.ts"
      function: "noSuchFunction"
      project_root: "."
    expect:
      status: error
      required_fields:
        code:
          type: string
        message:
          type: string
      dynamic_fields:
        - code
        - message
        - details

  - name: setup_session
    request:
      protocol_version: "0.1.0"
      id: 3
      command: setup
      file: "test-session.ts"
      scope: "test-session"
      level: "session"
      project_root: "."
      parent_context: null
    expect:
      # Real frontends may return error for nonexistent file paths
      status_oneof: [setup, error]
      required_fields_by_status:
        setup:
          setup_context:
            type: object
        error:
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - setup_context
        - code
        - message
        - details

  - name: teardown_session
    request:
      protocol_version: "0.1.0"
      id: 4
      command: teardown
      scope: "test-session"
      level: "session"
    expect:
      status_oneof: [teardown_ack, error]
      required_fields_by_status:
        teardown_ack: {}
        error:
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - code
        - message
        - details

  - name: generate_value
    request:
      protocol_version: "0.1.0"
      id: 5
      command: generate
      file: "src/example.ts"
      name: "test-gen"
      kind: "type_name"
      recipe:
        generator: "TestGen"
        seed: 42
        config: {}
      project_root: "."
    expect:
      # Noop returns a value, real frontends may return error for nonexistent files
      status_oneof: [generate, error]
      required_fields_by_status:
        generate:
          value:
            type: any
        error:
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - value
        - code
        - message
        - details

  - name: prepare_not_supported_rust
    # Rust returns not_supported because execute is partial.
    frontends: [rust]
    request:
      protocol_version: "0.1.0"
      id: 10
      command: prepare
      file: "examples/rust/01-simple-add.rs"
      function: "add"
      mocks: []
    expect:
      status: error
      required_fields:
        code:
          type: string
        message:
          type: string
      dynamic_fields:
        - message

  - name: execute_with_invalid_prepare_id
    # Sending an unknown prepare_id to a frontend that supports prepare returns an error.
    # We test this by sending prepare_id without first calling prepare.
    frontends: [noop]
    request:
      protocol_version: "0.1.0"
      id: 11
      command: execute
      function: "add"
      inputs: [1, 2]
      mocks: []
      prepare_id: "deadbeefcafe0000"
    expect:
      status_oneof: [execute, error]
      required_fields_by_status:
        execute:
          branch_path:
            type: array
        error:
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - code
        - message

  # --- H4: feature_capabilities assertions ------------------------------
  #
  # These cases back the parity-matrix.yaml `feature_capabilities` block
  # (str-hy9b.H3) with observable behavior. Layout:
  #
  #   outcome               → driven against all three frontends (Go, TS,
  #                           Rust). Each frontend emits an `outcome` on
  #                           successful execute with status one of the
  #                           declared OutcomeStatus enum values
  #                           (completed, completed_with_findings,
  #                           unsupported, build_failed, runtime_failed,
  #                           timed_out, skipped_by_policy,
  #                           preflight_failed). Per str-hy9b.A5 the
  #                           wire shape is identical across frontends;
  #                           the per-frontend cases assert the same
  #                           enum and field structure.
  #   adapter_http_nethttp  → analyze a Go http handler fixture. Go must
  #                           surface functions[0].invocation_model with
  #                           adapter_id "go/http-handler". TS and Rust
  #                           must return a clean error response.
  #   invocation_plan       → no wire surface in frontends today; the
  #                           capability is declared but not observable.
  #                           Intentionally no case.
  #   hint_config_v1        → consumed internally by the Go
  #                           .shatter/config.yaml loader; no wire probe.
  #                           Intentionally no case.

  - name: execute_outcome_shape_go
    frontends: [go]
    request:
      protocol_version: "0.1.0"
      id: 20
      command: execute
      file: "protocol/conformance/fixtures/go/handler.go"
      function: "Serve"
      inputs: []
      mocks: []
    expect:
      status_oneof: [execute, error]
      required_fields_by_status:
        execute:
          outcome:
            type: object
            fields:
              status:
                type: string
                enum:
                  - completed
                  - completed_with_findings
                  - unsupported
                  - build_failed
                  - runtime_failed
                  - timed_out
                  - skipped_by_policy
        error:
          outcome:
            type: object
            fields:
              status:
                type: string
                enum:
                  - completed
                  - completed_with_findings
                  - unsupported
                  - build_failed
                  - runtime_failed
                  - timed_out
                  - skipped_by_policy
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - outcome
        - branch_path
        - return_value
        - code
        - message
        - details
        - functions

  - name: execute_outcome_shape_ts
    frontends: [typescript]
    request:
      protocol_version: "0.1.0"
      id: 30
      command: execute
      file: "protocol/conformance/fixtures/ts/add.ts"
      function: "protocol/conformance/fixtures/ts/add.ts:add"
      inputs: [3, 4]
      mocks: []
    expect:
      status_oneof: [execute, error]
      required_fields_by_status:
        execute:
          outcome:
            type: object
            fields:
              status:
                type: string
                enum:
                  - completed
                  - completed_with_findings
                  - unsupported
                  - build_failed
                  - runtime_failed
                  - timed_out
                  - skipped_by_policy
        error:
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - outcome
        - branch_path
        - return_value
        - thrown_error
        - lines_executed
        - calls_to_external
        - path_constraints
        - side_effects
        - performance
        - scope_events
        - code
        - message
        - details

  - name: execute_outcome_shape_rust
    frontends: [rust]
    # Rust execute compiles a per-target harness via cargo on first invocation,
    # which can take well over the default 30s on cold caches.
    timeout_s: 240
    request:
      protocol_version: "0.1.0"
      id: 31
      command: execute
      file: "protocol/conformance/fixtures/rust/add.rs"
      function: "add"
      inputs: [3, 4]
      mocks: []
    expect:
      status_oneof: [execute, error]
      required_fields_by_status:
        execute:
          outcome:
            type: object
            fields:
              status:
                type: string
                enum:
                  - completed
                  - completed_with_findings
                  - unsupported
                  - build_failed
                  - runtime_failed
                  - timed_out
                  - skipped_by_policy
        error:
          outcome:
            type: object
            fields:
              status:
                type: string
                enum:
                  - completed
                  - completed_with_findings
                  - unsupported
                  - build_failed
                  - runtime_failed
                  - timed_out
                  - skipped_by_policy
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - outcome
        - branch_path
        - return_value
        - thrown_error
        - lines_executed
        - calls_to_external
        - path_constraints
        - side_effects
        - performance
        - code
        - message
        - details

  - name: adapter_http_nethttp_go_analyze
    frontends: [go]
    request:
      protocol_version: "0.1.0"
      id: 21
      command: analyze
      file: "protocol/conformance/fixtures/go/handler.go"
      function: "Serve"
      project_root: "."
    expect:
      status_oneof: [analyze, error]
      required_fields_by_status:
        analyze:
          functions:
            type: array
            min_length: 1
            first_item_fields:
              invocation_model:
                type: object
                fields:
                  adapter_id:
                    type: string
                    enum: ["go/http-handler"]
        error:
          code:
            type: string
          message:
            type: string
      dynamic_fields:
        - functions
        - code
        - message
        - details

  - name: adapter_http_nethttp_ts_rust_reject
    frontends: [typescript, rust]
    request:
      protocol_version: "0.1.0"
      id: 22
      command: analyze
      file: "protocol/conformance/fixtures/go/handler.go"
      function: "Serve"
      project_root: "."
    expect:
      status: error
      required_fields:
        code:
          type: string
        message:
          type: string
      dynamic_fields:
        - code
        - message
        - details

  - name: shutdown
    request:
      protocol_version: "0.1.0"
      id: 99
      command: shutdown
    expect:
      status: shutdown_ack
      required_fields: {}
      dynamic_fields: []
      expect_exit: true
