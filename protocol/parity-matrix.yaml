# Shatter Frontend Parity Matrix
#
# Machine-readable classification of all protocol-visible capabilities by parity
# status and per-frontend implementation state.
#
# Version tracks the protocol version this matrix was generated against.
# Update this file whenever registry.yaml changes.
#
# Status values:
#   required         — every conforming frontend must implement
#   optional         — frontend advertises via handshake; core gates calls on presence
#   frontend_specific — meaningful only in a particular language's ecosystem
#
# Implementation values:
#   implemented      — fully working
#   partial          — handler exists but behavior is incomplete (see notes)
#   not_implemented  — not supported; must not be advertised in capabilities
#
# Human-readable companion: protocol/PARITY.md

version: "0.1.0"

# ---------------------------------------------------------------------------
# Commands
# ---------------------------------------------------------------------------
#
# handshake and shutdown are not listed in the capabilities section of
# registry.yaml because they are base-protocol commands — every frontend must
# handle them regardless of what it advertises in the handshake response.
#
# All other commands are capability-gated: core checks the frontend's
# advertised capabilities before sending them.

commands:
  handshake:
    status: required
    notes: "Base protocol command; not a negotiated capability."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  shutdown:
    status: required
    notes: "Base protocol command; not a negotiated capability."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  analyze:
    status: required
    notes: "All frontends implement. Core depends on this for every exploration."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  execute:
    status: required
    notes: >
      All frontends advertise this capability. Rust handler parses execute
      requests but execution logic is not yet implemented
      (see allowed_divergences: rust-execute-unimplemented).
    frontends:
      typescript: implemented
      go: implemented
      rust: partial

  generate:
    status: required
    notes: "All frontends implement custom generator invocation."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  instrument:
    status: optional
    notes: >
      Advertised by TypeScript and Go; Rust does not support instrumentation.
      Core checks capabilities before sending.
    frontends:
      typescript: implemented
      go: implemented
      rust: not_implemented

  setup:
    status: optional
    notes: >
      Advertised by TypeScript and Go; Rust does not support state setup.
      Core checks capabilities before sending.
    frontends:
      typescript: implemented
      go: implemented
      rust: not_implemented

  teardown:
    status: optional
    notes: >
      Only Go advertises and implements teardown. TypeScript relies on
      process-level cleanup instead (see allowed_divergences: ts-missing-teardown).
      Rust does not support state setup so teardown is also not applicable.
      Core checks capabilities before sending.
    frontends:
      typescript: not_implemented
      go: implemented
      rust: not_implemented

# ---------------------------------------------------------------------------
# Complex Type Capabilities
# ---------------------------------------------------------------------------
#
# All complex_type capabilities are optional. Frontends advertise which types
# they can generate; core only requests generation for advertised types.
# Many types are language-ecosystem-specific and are not expected in other
# frontends (e.g. rune/go_byte are Go-only; symbol/buffer are TypeScript-only).
#
# language_affinity lists the language(s) where this type is native. A frontend
# from a different ecosystem is not expected to support it.

complex_type_capabilities:
  date:
    status: optional
    language_affinity: [typescript, go, rust]
    frontends:
      typescript: supported
      go: supported
      rust: not_supported

