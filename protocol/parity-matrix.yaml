# Shatter Frontend Parity Matrix
#
# Machine-readable parity contract consumed by scripts/validate-parity.py.
# CI task: task parity
#
# Ownership: str-7jgm.1 (parity contract spec) seeds and maintains this file.
# This bootstrap version reflects actual code state as of protocol version 0.1.0.
# Merge note: reconcile with str-7jgm.1's version; this file is the source of
# truth for validator CI — it must match what frontend handler code actually does.
#
# To update after a capability change:
#   1. Edit this file to match the new expected state
#   2. Run: python3 scripts/validate-parity.py --verbose
#   3. Commit both the source change and this file together

version: "0.1.0"

shared_wire_types:
  outcome_status:
    notes: >
      Reusable enum for invocation results. The canonical values are
      completed, completed_with_findings, unsupported, build_failed,
      runtime_failed, timed_out, skipped_by_policy, and preflight_failed
      (str-jeen.40 — env-preflight failures distinct from unsupported).
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented
  no_target_reason:
    notes: >
      Closed-taxonomy enum classifying why a per-file run produced zero
      targets. Canonical snake_case tokens: unclassified, declaration_only,
      jsx_component_only, test_or_spec, receiver_method_gap, generated,
      test_file, test_module, build_script, policy_excluded,
      parser_failure, generated_schema. Default is `unclassified`; the
      field is omitted (or null) for files that produced at least one
      target. Defined by str-jeen.21 (schema-only); the
      frontend-agnostic pre-classifier (str-jeen.25) populates
      policy_excluded / generated_schema / parser_failure CLI-side
      before/after analyze. Per-language refinements (str-jeen.22 TS,
      str-jeen.23 Go, str-jeen.24 Rust) are also CLI-hosted: the
      classifiers live in `shatter-cli/src/commands/explore.rs` and key
      on file path + capped source read. The Response wire shape is
      unchanged — the protocol does not yet carry no_target_reason from
      frontend → CLI, and the CLI annotates per-file ExploreSummary
      records directly. A future protocol change can flip these entries
      cleanly when frontends start emitting the field on responses.
    frontends:
      typescript: implemented_via_cli_classifier
      go: implemented_via_cli_classifier
      rust: implemented_via_cli_classifier
  invocation_outcome:
    notes: >
      Reusable object with fields status, short_reason, return_value,
      thrown_error, and side_effects. `short_reason` is a one-sentence
      human-readable explanation required (non-empty) for every non-completed
      status; the field itself is present on every binding. TypeScript and Go
      also use this shape for adapter-owned invocation helpers; Rust mirrors
      the wire contract for parity even though execute responses remain
      flattened. The Go frontend emits InvocationOutcome on every execute
      response (str-hy9b.A2); other frontends have the type but do not yet
      populate it on execute responses.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

# --- Commands ---
#
# status: required         All frontends must implement
# status: optional         Frontends may choose to implement
# status: frontend_specific Only certain frontends expected to implement
#
# frontends.<name>:
#   implemented     must be advertised in handshake capabilities; validator FAILS if absent
#   not_implemented must NOT be advertised in handshake; validator FAILS if present
#   partial         advertised but functionally incomplete — informational only, not checked

commands:
  handshake:
    status: required
    notes: "Base protocol command; not a negotiated capability."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  shutdown:
    status: required
    notes: "Base protocol command; not a negotiated capability."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  analyze:
    status: required
    notes: "All frontends implement. Core depends on this for every exploration."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  prepare:
    status: optional
    notes: >
      All three frontends implement prepare (pre-build harness once, reuse binary/script
      across execute calls). Core checks capabilities before sending.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  execute:
    status: required
    notes: >
      All frontends advertise execute and return the standardized execute
      outcome envelope.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  generate:
    status: required
    notes: "All frontends implement custom generator invocation."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  instrument:
    status: optional
    notes: >
      TypeScript and Go instrument for symbolic tracking. Rust instruments
      Rust source for branch recording. Core checks capabilities before sending.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  setup:
    status: optional
    notes: >
      TypeScript and Go support state setup. Rust also implements setup
      (compiles and runs setup functions from source). Core checks capabilities.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  get_invocation_plan:
    status: optional
    notes: >
      Invocation planner consultation (str-hy9b.H2). The frontend resolves
      InvocationRequirements into concrete InvocationPlans for the Rust core's
      planner_consumer. Only Go currently advertises this capability; the Rust
      core is the consumer side. TypeScript has no planner yet.
    frontends:
      typescript: not_implemented
      go: implemented
      rust: not_implemented

  teardown:
    status: optional
    notes: >
      All three frontends implement and advertise teardown.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

