# ---------------------------------------------------------------------------
# Branch Types
# ---------------------------------------------------------------------------
#
# Most branch types are universal. The select type is Go-specific and is
# declared language_specific in registry.yaml.

branch_types:
  if:
    status: required
    language_specific: []
  else_if:
    status: required
    language_specific: []
  switch:
    status: required
    language_specific: []
  ternary:
    status: required
    language_specific: []
  logical_and:
    status: required
    language_specific: []
  logical_or:
    status: required
    language_specific: []
  while:
    status: required
    language_specific: []
  for:
    status: required
    language_specific: []
  select:
    status: frontend_specific
    language_specific: [go]
    notes: "Go select statement for channel operations; not applicable to TypeScript or Rust."

# ---------------------------------------------------------------------------
# Protocol Behaviors
# ---------------------------------------------------------------------------

protocol_behaviors:
  execution_timeout:
    env_var: SHATTER_EXEC_TIMEOUT
    unit: seconds
    notes: "Invalid values (non-numeric, zero, negative) silently fall back to default."
    frontends:
      typescript:
        default_s: 15
        implementation: "getExecTimeoutMs() in shatter-ts/src/executor.ts"
      go:
        default_s: 5
        implementation: "execTimeout() in shatter-go/instrument/executor.go"
      rust:
        default_s: 5
        implementation: "exec_timeout_from_env() in shatter-rust/src/handler.rs"
        notes: "Value is stored but not yet applied; execute is unimplemented."

  version_compatibility:
    strategy: major_minor_match
    mismatch_error_code: version_mismatch
    notes: "Patch-level differences are tolerated. Minor bumps may add optional fields."

# ---------------------------------------------------------------------------
# Allowed Divergences
# ---------------------------------------------------------------------------
#
# Cross-frontend mismatches that are known, tracked, and temporarily accepted.
# These produce warnings (not failures) in the conformance harness.
#
# Status values:
#   tracked   — known mismatch with a resolution plan; warning in CI
#   accepted  — intentional permanent divergence; no resolution planned
#   resolved  — mismatch has been fixed; entry kept for history

allowed_divergences:
  - id: go-extra-functions-field
    description: >
      The Go handler includes an extra 'functions' field in all responses.
      TypeScript and Rust do not emit this field.
    affected_frontends: [go]
    affected_commands: [all]
    status: tracked
    conformance_pattern: ".functions: missing in"
    resolution: "Remove the extra field from Go responses in a future cleanup pass."

  - id: ts-missing-teardown
    description: >
      TypeScript does not advertise the teardown capability and does not implement
      a teardown handler. State initialized via setup in a TypeScript session cannot
      be explicitly torn down via protocol; the frontend relies on process-level cleanup.
    affected_frontends: [typescript]
    affected_commands: [teardown]
    status: tracked
    resolution: >
      Implement teardown in the TypeScript frontend and add 'teardown' to
      SUPPORTED_CAPABILITIES in shatter-ts/src/handlers.ts.

  - id: rust-execute-unimplemented
    description: >
      The Rust frontend advertises the execute capability in handshake but the
      execution logic in the handler is not implemented. Execute requests are
      parsed but the function is not actually called.
    affected_frontends: [rust]
    affected_commands: [execute]
    status: tracked
    resolution: >
      Implement the execute handler in shatter-rust/src/handler.rs and apply
      the stored exec timeout value from exec_timeout_from_env().
