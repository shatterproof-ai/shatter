  - id: error-code-preflight-failed-typescript-only
    description: >
      The `preflight_failed` error code and matching `OutcomeStatus`
      variant are declared in all three frontend bindings (TS, Go,
      Rust) for wire compatibility, but only the TypeScript frontend
      currently runs an environment preflight that emits the code
      (str-jeen.26 → str-jeen.40 — node_modules / install check before
      analyze/instrument/prepare/execute/setup). Go and Rust have no
      equivalent preflight emitter today; both accept and round-trip
      the code on the wire but never produce it. The CLI's
      batch_analyze and explore bucket logic treat `preflight_failed`
      from any frontend identically, so adding emitters in Go/Rust
      later requires no core-side change.
    affected_frontends: [go, rust]
    affected_commands: [analyze, instrument, prepare, execute, setup]
    status: tracked
    owner: Ketan Gangatirkar
    tracking_issue: str-1hlk.18
    resolution_condition: >
      Go and Rust frontends emit preflight_failed for equivalent
      missing-dependency or missing-toolchain conditions (missing go.sum
      / module cache for Go; missing toolchain or target dir for Rust).
    resolution: >
      Add an environment preflight in the Go and Rust frontends that
      emits `preflight_failed` for the equivalent missing-dependency or
      missing-toolchain conditions (e.g. missing `go.sum` / module
      cache for Go, missing toolchain or target dir for Rust).

  - id: loop-body-states-typescript-only
    description: >
      TypeScript, Go, and Rust now emit `loop_body_states` in execute
      responses for supported loop executions. Go reconstructs loop_id,
      zero-based iteration snapshots, and simple identifier-local symbolic
      snapshots for counted-loop accumulators from cached `LoopInfo`,
      source AST flow, and observed runtime `scope_events`; Rust records loop
      body entry directly in its runtime. Rust currently emits empty `locals`
      maps because its runtime hook has no source-level symbolic environment.
    affected_frontends: [go, rust]
    affected_commands: [execute]
    status: resolved
    resolved_at: 2026-05-07
    owner: Ketan Gangatirkar
    tracking_issue: str-1hlk.19
    resolution_condition: >
      Go and Rust execute paths populate loop_body_states with the same
      loop_id and zero-based iteration contract as TypeScript, or the
      reconstruction logic moves into a shared core-side postprocessor.
    resolution: >
      Go direct execute emits loop_body_states from LoopInfo plus scope_events;
      Rust instrumented execute emits loop_body_states from runtime loop_enter
      hooks. Both use the same loop_id and zero-based iteration contract. Go
      also emits symbolic locals for a narrow counted-loop accumulator slice.
