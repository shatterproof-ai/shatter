      frontend gains medium-opacity analysis, it should emit medium_opacity
      following the same heuristics as TypeScript and Go.

  - id: ite-symexpr-production-partial
    description: >
      The ite SymExpr variant represents SSA phi-node merges from conditional
      variable reassignment. TypeScript produces ite expressions via data flow
      analysis in visitStatementsForDataFlow (str-4kop). Go now also produces
      ite expressions: walkBodyForFlow builds a flow map (str-1hlk.17.1/17.2)
      and extractBranches threads it through buildSymExprWithFlow so branch
      conditions referencing conditionally-assigned local variables resolve to
      ite nodes (str-1hlk.17.3). Rust analyzes branches and symbolic conditions
      but does not yet perform the data-flow pass needed to produce ite.
    affected_frontends: [rust]
    affected_commands: [analyze]
    status: tracked
