# Shatter Frontend Parity Matrix
#
# Machine-readable parity contract consumed by scripts/validate-parity.py.
# CI task: npx task parity
#
# Ownership: str-7jgm.1 (parity contract spec) seeds and maintains this file.
# This bootstrap version reflects actual code state as of protocol version 0.1.0.
# Merge note: reconcile with str-7jgm.1's version; this file is the source of
# truth for validator CI — it must match what frontend handler code actually does.
#
# To update after a capability change:
#   1. Edit this file to match the new expected state
#   2. Run: python3 scripts/validate-parity.py --verbose
#   3. Commit both the source change and this file together

version: "0.1.0"

shared_wire_types:
  outcome_status:
    notes: >
      Reusable enum for invocation results. The canonical values are
      completed, completed_with_findings, unsupported, build_failed,
      runtime_failed, timed_out, and skipped_by_policy.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented
  invocation_outcome:
    notes: >
      Reusable object with fields status, return_value, thrown_error, and
      side_effects. TypeScript and Go also use this shape for adapter-owned
      invocation helpers; Rust mirrors the wire contract for parity even though
      execute responses remain flattened.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

# --- Commands ---
#
# status: required         All frontends must implement
# status: optional         Frontends may choose to implement
# status: frontend_specific Only certain frontends expected to implement
#
# frontends.<name>:
#   implemented     must be advertised in handshake capabilities; validator FAILS if absent
#   not_implemented must NOT be advertised in handshake; validator FAILS if present
#   partial         advertised but functionally incomplete — informational only, not checked

commands:
  handshake:
    status: required
    notes: "Base protocol command; not a negotiated capability."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  shutdown:
    status: required
    notes: "Base protocol command; not a negotiated capability."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  analyze:
    status: required
    notes: "All frontends implement. Core depends on this for every exploration."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  prepare:
    status: optional
    notes: >
      All three frontends implement prepare (pre-build harness once, reuse binary/script
      across execute calls). Core checks capabilities before sending.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  execute:
    status: required
    notes: >
      All frontends advertise execute. Rust execute handler compiles and runs
      code but returns not_supported for NonExecutable inputs
      (see allowed_divergences: rust-execute-partial).
    frontends:
      typescript: implemented
      go: implemented
      rust: partial

  generate:
    status: required
    notes: "All frontends implement custom generator invocation."
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  instrument:
    status: optional
    notes: >
      TypeScript and Go instrument for symbolic tracking. Rust instruments
      Rust source for branch recording. Core checks capabilities before sending.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  setup:
    status: optional
    notes: >
      TypeScript and Go support state setup. Rust also implements setup
      (compiles and runs setup functions from source). Core checks capabilities.
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented

  teardown:
    status: optional
    notes: >
      Go and Rust implement teardown. TypeScript relies on process-level cleanup
      and does not advertise teardown (see allowed_divergences: ts-missing-teardown).
    frontends:
      typescript: not_implemented
      go: implemented
      rust: implemented

