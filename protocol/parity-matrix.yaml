# --- Side effect capture capabilities ---
#
# Documents which side-effect kinds each frontend actively captures and emits.
# All frontends that implement execute share the same 7-kind wire format
# (defined in shatter-core/src/execution_record.rs SideEffect enum).
# "captured" means the frontend actively detects and emits this kind.
# "not_captured" means the kind is structurally supported but not yet emitted.
#
# status: required   All execute-capable frontends must capture this kind
# status: optional   Frontends may capture this kind where language allows

side_effect_capabilities:
  console_output:
    status: required
    notes: >
      All execute-capable frontends must capture stdout/stderr output.
      TypeScript and Go emit per-call entries with level values
      "log", "warn", "error", "info", and "debug". Rust currently captures
      stdout/stderr as combined buffers using level "log" for stdout and
      "error" for stderr.
      Rust captures via fd redirection in standalone/dispatch harnesses;
      crate-bridge harness does not capture console output.
    frontends:
      typescript: captured
      go: captured
      rust: captured   # standalone/dispatch harnesses; crate-bridge skips

  global_state_change:
    status: optional
    notes: >
      TS tracks exported module-level variable mutations by comparing
      JSON.stringify(before) vs after. Go tracks exported package-level
      variables. Rust tracks mutable static variables via serde snapshots.
    frontends:
      typescript: captured
      go: captured
      rust: captured

  thrown_error:
    status: optional
    notes: >
      TS and Rust capture errors/panics during execution (error_type, message, stack).
      Go captures panics/errors both via the top-level thrown_error field and
      as a thrown_error side effect entry.
    frontends:
      typescript: captured
      go: captured
      rust: captured

  global_mutation:
    status: optional
    notes: >
      TS captures mutations to exported module-level names (name only, no value).
      Distinct from global_state_change which captures before/after values.
      Go emits name-only entries when its exported package-level global diff
      detects a changed variable.
    frontends:
      typescript: captured
      go: captured
      rust: not_captured

  file_write:
    status: optional
    notes: >
      Go captures high-confidence package-level os.WriteFile calls through
      overlay AST instrumentation and emits {path, content?}. Lower-level
      os.File.Write/WriteString, syscall writes, third-party filesystem APIs,
      and writes performed by uninstrumented dependencies remain outside this
      interception boundary.
    frontends:
      typescript: not_captured
      go: captured
      rust: not_captured

  network_request:
    status: optional
    notes: >
      Go captures high-confidence package-level net/http.Get, Post, and
      PostForm calls through overlay AST instrumentation and emits
      {method, url, body?}; request bodies are not duplicated because doing so
      would consume arbitrary io.Reader values. Custom clients, http.Client.Do,
      transports, raw net.Dial traffic, and uninstrumented dependencies remain
      outside this interception boundary.
    frontends:
      typescript: not_captured
      go: captured
      rust: not_captured

  environment_read:
    status: optional
    notes: >
      Go captures high-confidence package-level os.Getenv and os.LookupEnv
      calls through overlay AST instrumentation and emits {variable, value?}.
      Bulk os.Environ reads, syscall-level environment access, and
      uninstrumented dependencies remain outside this interception boundary.
    frontends:
      typescript: not_captured
      go: captured
      rust: not_captured

# --- Feature capabilities ---
#
# Protocol-visible features introduced by the Go frontend redesign (str-hy9b).
# Declarative section mirroring side_effect_capabilities / adapter_capabilities:
# informational only, not enforced by scripts/validate-parity.py (which
# validates commands and complex_types). Conformance tests (str-hy9b.H4) read
# these entries to decide which cross-frontend assertions to run for each
# capability.
#
# status: required   All frontends must support
# status: optional   Frontends may support on their own timeline
#
# frontends.<name>:
#   supported      frontend implements the feature
#   not_supported  frontend does not implement (conformance expects a clean
#                  "capability not supported" response, per H4)
#   partial        advertised but incomplete — informational only

feature_capabilities:
  outcome:
    status: optional
    notes: >
      Standardized invocation-outcome wire shape (see shared_wire_types.outcome_status
      and shared_wire_types.invocation_outcome). Introduced in str-hy9b.A1 and
      brought to cross-frontend parity in str-hy9b.A5. All three frontends emit
      outcomes for analyze→execute flows.
    frontends:
      typescript: supported
      go: supported
      rust: supported

  invocation_plan:
    status: optional
    notes: >
      Planner artifact schema (str-hy9b.E1), the `get_invocation_plan`
      command wired through the Rust engine (str-hy9b.H2), and the
      receiver-aware planner pathway (str-hy9b.H5). Go frontend advertises
      the capability and services planning via planner.PlanRequirements.
      Free functions take the existing parameter-only path; method targets
      now invoke planner.PlanReceivers with same-package constructor
      candidates and compose receiver plans with parameter plans, producing
      InvocationPlans whose `receiver_kind` is non-empty (e.g.
      `"constructor:NewService"` or `"zero_value"`). Rust core is the
      consumer (planner_consumer::fetch_planner_seeds), and the
      `Command::Execute.plan` field (also added in str-hy9b.H5) lets
      Execute callers thread an InvocationPlan through to the Go launcher
      so method targets dispatch through the wrapper's receiver-kind
      switch instead of hard-erroring with `method_not_supported`. The
      CLI `--planner=go` flag seeds the observe stage for both explorer
      and orchestrator paths. TypeScript has no planner yet; the Rust
      frontend does not yet consume `Execute.plan` either — see
      `ts-rust-execute-plan-not-implemented` below.

      `argument_plans[].kind` enum: `literal`, `zero`, `random`, `symbolic`,
      `runtime_value` (str-1hlk.4). The Go planner emits `runtime_value` for
      parameters resolved from the Go runtime-value registry (e.g.
      `context.Context` → `context.Background()`); the Rust core deserializes
      it but does not materialize it into a seed.

      str-gxjs.1: the producing frontend now resolves the source expression
      at WRAPPER BUILD time rather than execute time. When a parameter's
      Go-source type matches a `shatter-go/runtimeval` registry entry, the
      generated wrapper bakes the expression into the param-init site
      (`var ctx context.Context = context.Background()`) instead of
      decoding from `inputs[i]` via `json.Unmarshal`. Required imports are
      added to the wrapper's import block. The Rust core's
      `materialize_value` path remains unchanged: it still skips
      `runtime_value` plans because no seed is needed — the wrapper
      already has the value baked in.
    frontends:
      typescript: not_supported
      go: supported
      rust: not_supported

  adapter_http_nethttp:
    status: optional
    notes: >
      net/http handler adapter (str-hy9b.G1). Recognizes
      func(http.ResponseWriter, *http.Request) handlers and executes them via
      httptest.NewRequest / httptest.NewRecorder. Adapter ID go/http-handler.
      Go-specific — TS and Rust do not have a Go net/http equivalent.
    frontends:
      typescript: not_supported
      go: supported
      rust: not_supported

  hint_config_v1:
    status: optional
    notes: >
      .shatter/config.yaml hint schema (str-hy9b.G3). Declarative hints that
      influence target discovery, adapter selection, and planner behavior for
      Go packages. Go-only at this stage.
    frontends:
      typescript: not_supported
      go: supported
      rust: not_supported

# --- Adapter capabilities ---
#
# Adapters wrap function invocation for targets that cannot be called directly
# (async functions, framework handlers, etc.). Each adapter is language-specific.

adapter_capabilities:
  async_runtime:
    status: optional
    language_affinity: [rust]
    notes: >
      Generic adapter for async Rust functions. Wraps the function call in a
      Tokio runtime (tokio::runtime::Runtime::new().block_on()). Supports
      runtime-owned behavior: timers, spawned tasks, channels.
      Adapter IDs: rust/async-tokio (high confidence with Tokio evidence),
      rust/async-runtime (medium confidence for any async fn).
      Sync functions are unaffected when the adapter is not selected.
    frontends:
      typescript: not_supported
      go: not_supported
      rust: implemented

  axum_handler:
    status: optional
    language_affinity: [rust]
    notes: >
      Adapter for Axum HTTP handler functions. Constructs synthetic HTTP
      requests, routes through Axum's extraction pipeline via
      tower::ServiceExt::oneshot, and normalizes the HTTP response (status,
      headers, body) into ExecuteResult.
      Supported extractors: Json, Path, Query, State, Form, Extension,
      RawBody, RawQuery, Host, OriginalUri.
      Adapter ID: rust/framework/axum-handler.
      Composes with async runtime handling (Tokio runtime is created
      automatically since Axum handlers are async).
    frontends:
      typescript: not_supported
      go: not_supported
      rust: implemented

# --- Allowed divergences ---
#
# Known, intentional drift between frontends. These produce warnings (not
# failures) in the validator when the affected (frontend, command) pair
# is found in violation.
#
# Required fields per entry (enforced by scripts/validate-parity.py):
#   id, description, affected_frontends, affected_commands, status,
#   resolution, owner, tracking_issue, resolution_condition.
# `resolved` entries additionally require `resolved_at` (ISO YYYY-MM-DD)
# and are removed within a 30-day grace period after resolution; the
# validator FAILS once the grace expires (str-1hlk.12).
#
# status: tracked  - known, deferred or under investigation; tracking_issue
#                    must reference an open bd issue for the work
# status: accepted - intentional permanent divergence; tracking_issue may
#                    be the literal string "none" (justification in
#                    resolution / resolution_condition)
# status: resolved - no longer a divergence; remove the entry within
#                    30 days of resolved_at

allowed_divergences:
  - id: ts-missing-teardown
    description: >
      TypeScript does not advertise the teardown capability. State initialized
      via setup in a TypeScript session is cleaned up at the process level
      rather than via an explicit teardown call.
    affected_frontends: [typescript]
    affected_commands: [teardown]
    status: resolved
    resolved_at: 2026-05-11
    owner: Ketan Gangatirkar
    tracking_issue: str-1hlk.13
    resolution_condition: >
      'teardown' is present in SUPPORTED_CAPABILITIES in
      shatter-ts/src/handlers.ts and a teardown handler returns success.
    resolution: >
      Implement teardown in the TypeScript frontend and add 'teardown' to
      SUPPORTED_CAPABILITIES in shatter-ts/src/handlers.ts.

  - id: ts-rust-execute-plan-not-implemented
    description: >
      The `Command::Execute.plan` field (str-hy9b.H5) carries an optional
      InvocationPlan that Go consumes to drive method-receiver invocation
      through the wrapper's receiver-kind switch. TypeScript and Rust
      frontends accept the field on the wire (additive, omitempty) but do
      not consume it — Execute behavior on those frontends is unchanged.
      Field-presence-without-effect is a tracked divergence rather than an
      unadvertised drop so callers can rely on the field shape across
      languages even when only Go acts on it today.

      The divergence has a second, observable axis on method targets.
      In Go (str-hy9b.H5), an Execute on a method now dispatches through
      the launcher wrapper's receiver-kind switch: with a plan it invokes
      the named constructor (or zero-value strategy); without a plan the
      switch's default arm emits a `runtime_failed` outcome whose
      `short_reason` contains `"unknown receiver kind"`. TypeScript and
      Rust still respond to a method target with their pre-H5 capability
      rejection — `unsupported` outcome with `error_type =
      method_not_supported` — because neither has a planner-driven
      method dispatch path. Callers must therefore branch on frontend
      when interpreting method-target outcomes: Go yields `runtime_failed`
      (when no plan is supplied) or `completed` (when a viable plan is
      supplied); TS/Rust always yield `unsupported`/`method_not_supported`
      regardless of plan presence.
    affected_frontends: [typescript, rust]
    affected_commands: [execute]
    status: tracked
    owner: Ketan Gangatirkar
    tracking_issue: str-1hlk.16
    resolution_condition: >
      TypeScript and Rust execute handlers consume Command::Execute.plan
      and dispatch method targets via plan-driven invocation, matching
      Go's runtime_failed/completed outcome contract for method targets.
    resolution: >
      Implement plan-aware execute in TypeScript (when a planner is added
      in those frontends) and in Rust (when method-target invocation
      becomes part of the Rust frontend's surface). Both are deferred
      until a real planner exists in the corresponding frontend.

  - id: side-effect-thrown-error-placement
    description: >
      TypeScript and Rust emit thrown errors/panics as a side effect entry with
      { kind: "thrown_error", error_type, message, stack } inside the
      side_effects array AND via the top-level thrown_error response field.
      Go now reports thrown errors via both placements as well.
    affected_frontends: [go]
    affected_commands: [execute]
    status: resolved
    resolved_at: 2026-05-07
    owner: Ketan Gangatirkar
    tracking_issue: str-1hlk.14
    resolution_condition: >
      Go executor emits thrown_error entries inside the side_effects array
      in addition to the top-level thrown_error field.
    resolution: >
      Add thrown_error side effect emission to Go executor,
      mirroring TypeScript/Rust behavior. The top-level field can be retained
      for backwards compatibility.

  - id: go-side-effects-partial
    description: >
      Go captures all canonical side-effect kinds at the protocol level.
      For file_write, network_request, and environment_read, capture is limited
      to high-confidence stdlib package-level calls rewritten by the overlay
      AST instrumentation: os.WriteFile, os.Getenv, os.LookupEnv, and
      net/http.Get/Post/PostForm. Lower-level syscall/raw socket/custom client
      surfaces and uninstrumented dependencies are accepted permanent limits of
      the current source-overlay interception mechanism.
    affected_frontends: [go]
    affected_commands: [execute]
    status: accepted
    owner: Ketan Gangatirkar
    tracking_issue: none
    resolution_condition: >
      Go continues to emit the supported stdlib call shapes and this matrix
      names the lower-level surfaces that the overlay AST mechanism does not
      attempt to capture.
    resolution: >
      Keep Go capture source-level and deterministic. Do not add ptrace,
      eBPF, LD_PRELOAD, or platform-specific syscall interception unless a
      future issue explicitly introduces an OS-observation backend with a
      portability and sandboxing design.

  - id: medium-opacity-analyze-partial
    description: >
      The `medium_opacity` field on TypeInfo opaque variants is an optional advisory
      field added in str-gvde. TypeScript and Go frontends emit it when medium-confidence
      heuristics fire (infrastructure package prefix, closeable interface, native handle
      field). The Rust frontend performs static analysis but does not yet implement
      this medium-opacity heuristic, so it never emits `medium_opacity`.
      The field is intentionally non-skip-causing in the Rust core: check_executability
      only produces SkipReason for high-confidence opaque types (static_opacity set, or
      label in the known high-confidence lookup table). medium_opacity alone is advisory
      metadata reserved for learning mode (str-gtrv).
    affected_frontends: [rust]
    affected_commands: [analyze]
    status: accepted
    owner: Ketan Gangatirkar
    tracking_issue: none
    resolution_condition: >
