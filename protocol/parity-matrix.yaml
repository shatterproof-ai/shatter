  big_decimal:
    status: optional
    frontends:
      typescript: not_supported
      go: supported
      rust: not_supported
    language_affinity: [go]

# --- Allowed divergences ---
#
# Document known, intentional drift between frontends.
# status: tracked  — known, under investigation or deferred
# status: accepted — intentional long-term divergence
# status: resolved — no longer a divergence; remove when matrix is updated

allowed_divergences: []
