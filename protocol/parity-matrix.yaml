# Shatter Frontend Parity Matrix
#
# Machine-readable parity contract consumed by scripts/validate-parity.py.
# CI task: npx task parity
#
# Ownership: str-7jgm.1 (parity contract spec) populates and maintains this.
# Bootstrap version reflects actual code state as of protocol version 0.1.0.
#
# Validator failure conditions:
#   MISSING_REQUIRED — matrix says implemented but code doesn't advertise it
#   UNDOCUMENTED     — code advertises it but matrix says not_implemented
#
# To update after a capability change:
#   1. Edit this file to match the new expected state
#   2. Run: python3 scripts/validate-parity.py --verbose
#   3. Commit both the source change and this file together

# --- Commands ---
#
# status: required         All frontends in the frontends map are expected to comply
# status: optional         Frontends may choose to implement; no failure for absence
# status: frontend_specific Only certain frontends expected to implement
#
# frontends:
#   <frontend>: implemented    | must be advertised in handshake capabilities
#               not_implemented| must NOT be advertised in handshake capabilities
#               partial        | advertised but functionally incomplete (informational only)

commands:
  handshake:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented
    notes: "Always handled; not listed in capabilities list (implicit)"

  analyze:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: partial
    notes: "Rust advertises analyze in capabilities but returns not_supported; tracked pending full implementation"

  instrument:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: partial
    notes: "Rust advertises instrument in capabilities but returns not_supported; tracked pending full implementation"

  execute:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: partial
    notes: "Rust advertises execute in capabilities but returns not_supported; tracked pending full implementation"

  setup:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: partial
    notes: "Rust advertises setup in capabilities but returns not_supported; tracked pending full implementation"

  teardown:
    status: optional
    frontends:
      typescript: not_implemented
      go: implemented
      rust: partial
    notes: "TypeScript does not advertise teardown. Rust advertises but returns not_supported."

  generate:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: partial
    notes: "Rust advertises generate in capabilities but returns not_supported; tracked pending full implementation"

  shutdown:
    status: required
    frontends:
      typescript: implemented
      go: implemented
      rust: implemented
    notes: "Always handled; not listed in capabilities list (implicit)"

# --- Complex type capabilities ---
#
# status: optional   Frontends may choose to implement
#
# frontends:
#   <frontend>: supported     | advertised in handshake capabilities
#               not_supported | not advertised in handshake capabilities
#
# language_affinity: languages where this type maps naturally to native types

complex_type_capabilities:
  date:
    status: optional
    frontends:
      typescript: supported
      go: supported
      rust: not_supported
    language_affinity: [ts, go]

  date_time:
    status: optional
    frontends:
      typescript: supported
      go: not_supported
      rust: not_supported
    language_affinity: [ts]

  duration:
    status: optional
    frontends:
      typescript: supported
      go: supported
      rust: not_supported
    language_affinity: [ts, go]

  reg_exp:
    status: optional
    frontends:
      typescript: supported
      go: supported
      rust: not_supported
    language_affinity: [ts, go]

  url:
    status: optional
    frontends:
      typescript: supported
      go: supported
      rust: not_supported
    language_affinity: [ts, go]

  big_int:
    status: optional
    frontends:
      typescript: supported
      go: supported
      rust: not_supported
    language_affinity: [ts, go]

  buffer:
    status: optional
    frontends:
      typescript: supported
      go: not_supported
      rust: not_supported
    language_affinity: [ts]

  error:
    status: optional
    frontends:
      typescript: supported
      go: supported
      rust: not_supported
    language_affinity: [ts, go]

  symbol:
    status: optional
    frontends:
      typescript: supported
      go: not_supported
      rust: not_supported
    language_affinity: [ts]

  ip_address:
    status: optional
    frontends:
      typescript: not_supported
      go: supported
      rust: not_supported
    language_affinity: [go]

  rational:
    status: optional
    frontends:
