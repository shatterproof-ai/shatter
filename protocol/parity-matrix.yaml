# --- Side effect capture capabilities ---
#
# Documents which side-effect kinds each frontend actively captures and emits.
# All frontends that implement execute share the same 7-kind wire format
# (defined in shatter-core/src/execution_record.rs SideEffect enum).
# "captured" means the frontend actively detects and emits this kind.
# "not_captured" means the kind is structurally supported but not yet emitted.
#
# status: required   All execute-capable frontends must capture this kind
# status: optional   Frontends may capture this kind where language allows

side_effect_capabilities:
  console_output:
    status: required
    notes: >
      All execute-capable frontends must capture stdout/stderr output.
      Level values: "log", "warn", "error", "info", "debug" (TS);
      "log" (stdout) and "error" (stderr) as combined buffers (Go and Rust).
      Rust captures via fd redirection in standalone/dispatch harnesses;
      crate-bridge harness does not capture console output.
    frontends:
      typescript: captured
      go: captured
      rust: captured   # standalone/dispatch harnesses; crate-bridge skips

  global_state_change:
    status: optional
    notes: >
      TS tracks exported module-level variable mutations by comparing
      JSON.stringify(before) vs after. Go tracks exported package-level
      variables. Rust tracks mutable static variables via serde snapshots.
    frontends:
      typescript: captured
      go: captured
      rust: captured

  thrown_error:
    status: optional
    notes: >
      TS and Rust capture errors/panics during execution (error_type, message, stack).
      Go does not yet capture thrown_error; panics are handled internally.
      See go-side-effects-partial for tracking.
    frontends:
      typescript: captured
      go: not_captured
      rust: captured

  global_mutation:
    status: optional
    notes: >
      TS captures mutations to exported module-level names (name only, no value).
      Distinct from global_state_change which captures before/after values.
      Go does not yet emit this kind.
    frontends:
      typescript: captured
      go: not_captured
      rust: not_captured

  file_write:
    status: optional
    notes: >
      Not yet captured by any frontend. Would require OS-level file syscall
      interception. Protocol shape: {path, content?}.
    frontends:
      typescript: not_captured
      go: not_captured
      rust: not_captured

  network_request:
    status: optional
    notes: >
      Not yet captured by any frontend. Would require HTTP interception.
      Protocol shape: {method, url, body?}.
    frontends:
      typescript: not_captured
      go: not_captured
      rust: not_captured

  environment_read:
    status: optional
    notes: >
      Not yet captured by any frontend. Would require env-read interception.
      Protocol shape: {variable, value?}.
    frontends:
      typescript: not_captured
      go: not_captured
      rust: not_captured

# --- Allowed divergences ---
#
# Known, intentional drift between frontends. These produce warnings (not
# failures) in the validator when the affected (frontend, command) pair
# is found in violation.
#
# status: tracked  — known, deferred or under investigation
# status: accepted — intentional permanent divergence
# status: resolved — no longer a divergence; remove entry when matrix is updated

# --- Side effect capabilities ---
#
# Which side effect kinds each frontend captures in the execute response's
# side_effects array. All supported kinds use the same field names (normalized).
#
# status: required   All frontends must capture this kind
# status: optional   Frontends may capture this kind; coverage diverges

side_effect_capabilities:
  global_state_change:
    status: required
    notes: >
      All frontends capture global/package/static mutable variable changes
      using identical payload shape: { kind, variable, before, after }.
    frontends:
      typescript: supported
      go: supported
      rust: supported

  console_output:
    status: optional
    notes: >
      TypeScript, Go, and Rust capture console/stdout output with shape { kind, level, message }.
      Coverage granularity differs between TS (per-call) and Go/Rust (process-level bulk);
      see allowed_divergences: side-effect-console-coverage.
      Rust crate-bridge harness does not capture console output.
    frontends:
      typescript: supported
      go: supported
      rust: supported

  thrown_error:
    status: optional
    notes: >
      TypeScript and Rust emit thrown errors/panics as a thrown_error side effect entry.
      Go reports via the top-level thrown_error response field instead.
      See allowed_divergences: side-effect-thrown-error-placement.
    frontends:
      typescript: supported
      go: not_supported
      rust: supported

# --- Adapter capabilities ---
#
# Adapters wrap function invocation for targets that cannot be called directly
# (async functions, framework handlers, etc.). Each adapter is language-specific.

adapter_capabilities:
  async_runtime:
    status: optional
    language_affinity: [rust]
    notes: >
      Generic adapter for async Rust functions. Wraps the function call in a
      Tokio runtime (tokio::runtime::Runtime::new().block_on()). Supports
      runtime-owned behavior: timers, spawned tasks, channels.
      Adapter IDs: rust/async-tokio (high confidence with Tokio evidence),
      rust/async-runtime (medium confidence for any async fn).
      Sync functions are unaffected when the adapter is not selected.
    frontends:
      typescript: not_supported
      go: not_supported
      rust: implemented

  axum_handler:
    status: optional
    language_affinity: [rust]
    notes: >
      Adapter for Axum HTTP handler functions. Constructs synthetic HTTP
      requests, routes through Axum's extraction pipeline via
      tower::ServiceExt::oneshot, and normalizes the HTTP response (status,
      headers, body) into ExecuteResult.
      Supported extractors: Json, Path, Query, State, Form, Extension,
      RawBody, RawQuery, Host, OriginalUri.
      Adapter ID: rust/framework/axum-handler.
      Composes with async runtime handling (Tokio runtime is created
      automatically since Axum handlers are async).
    frontends:
      typescript: not_supported
      go: not_supported
      rust: implemented

allowed_divergences:
  - id: ts-missing-teardown
    description: >
      TypeScript does not advertise the teardown capability. State initialized
      via setup in a TypeScript session is cleaned up at the process level
      rather than via an explicit teardown call.
    affected_frontends: [typescript]
    affected_commands: [teardown]
    status: tracked
    resolution: >
      Implement teardown in the TypeScript frontend and add 'teardown' to
      SUPPORTED_CAPABILITIES in shatter-ts/src/handlers.ts.

  - id: rust-execute-partial
    description: >
      The Rust execute handler compiles and runs Rust code but returns
      not_supported for NonExecutable inputs (e.g. functions requiring
      dynamic dispatch). Full execution parity with TypeScript and Go is pending.
    affected_frontends: [rust]
    affected_commands: [execute]
    status: tracked
    resolution: >
      Expand the Rust executor to handle all input types that TS/Go handle,
      removing the NonExecutable early-exit path.

  - id: rust-prepare-not-supported
    description: >
      The Rust frontend now implements the prepare command. It pre-builds the
      harness binary and returns a prepare_id (SHA-256 of file:function:mocks,
      first 16 hex chars). Subsequent execute calls with that prepare_id skip
      compilation.
    affected_frontends: [rust]
    affected_commands: [prepare]
    status: resolved

  - id: side-effect-console-coverage
    description: >
      All frontends that capture console output use the same shape
      { kind: "console_output", level, message }, but differ in granularity.
      TypeScript intercepts each console.* call individually (per-call, distinct
      log levels). Go and Rust capture process-level stdout/stderr bulk output
      (all stdout → level "log", all stderr → level "error").
      Rust crate-bridge harness does not capture console output.
    affected_frontends: [go]
    affected_commands: [execute]
    status: tracked
    resolution: >
      Improve Go to capture per-call console output via harness injection.

  - id: side-effect-thrown-error-placement
    description: >
      TypeScript and Rust emit thrown errors/panics as a side effect entry with
      { kind: "thrown_error", error_type, message, stack } inside the
      side_effects array AND via the top-level thrown_error response field.
      Go reports thrown errors exclusively via the top-level field.
    affected_frontends: [go]
    affected_commands: [execute]
    status: tracked
    resolution: >
      Add thrown_error side effect emission to Go executor,
      mirroring TypeScript/Rust behavior. The top-level field can be retained
      for backwards compatibility.

  - id: go-side-effects-partial
    description: >
      Go only captures console_output and global_state_change side effects.
      The kinds thrown_error, global_mutation, file_write, network_request,
      and environment_read are defined in the protocol struct and wire format
      but not yet emitted by the Go executor. The instrument.SideEffect struct
      and convertSideEffects() fully support all 7 kinds; only the capture
      logic is missing.
    affected_frontends: [go]
    affected_commands: [execute]
    status: tracked
    resolution: >
      Implement thrown_error capture by wrapping goroutine execution and
      detecting panics/recovered errors. file_write, network_request, and
      environment_read require OS-level interception which is not yet planned.

  - id: rust-side-effects-not-captured
    description: >
      The Rust frontend now captures 3 of the 7 canonical side effect kinds:
      console_output (stdout/stderr via fd redirection in standalone/dispatch
      harnesses), thrown_error (panics caught and emitted as side effects),
      and global_state_change (mutable static variable snapshots). The remaining
      kinds (global_mutation, file_write, network_request, environment_read)
      are not yet captured. Crate-bridge harness does not capture console_output.
    affected_frontends: [rust]
    affected_commands: [execute]
    status: resolved

  - id: medium-opacity-analyze-partial
    description: >
      The `medium_opacity` field on TypeInfo opaque variants is an optional advisory
      field added in str-gvde. TypeScript and Go frontends emit it when medium-confidence
      heuristics fire (infrastructure package prefix, closeable interface, native handle
      field). The Rust frontend analyze handler is a stub and does not yet perform
      static analysis, so it never emits `medium_opacity`.
      The field is intentionally non-skip-causing in the Rust core: check_executability
      only produces SkipReason for high-confidence opaque types (static_opacity set, or
      label in the known high-confidence lookup table). medium_opacity alone is advisory
      metadata reserved for learning mode (str-gtrv).
    affected_frontends: [rust]
    affected_commands: [analyze]
    status: accepted
    resolution: >
      Intentional permanent divergence for the Rust frontend analyze stub.
      When/if the Rust frontend gains full static analysis, it should emit
      medium_opacity following the same heuristics as TypeScript and Go.

  - id: ite-symexpr-production-partial
    description: >
      The ite SymExpr variant represents SSA phi-node merges from conditional
      variable reassignment. TypeScript produces ite expressions via data flow
      analysis in visitStatementsForDataFlow (str-4kop). Go and Rust frontends
      can deserialize ite (struct fields / enum variant present) but do not
      produce ite because they lack data flow tracking. Go only resolves
      function parameters in exprToSymExpr; Rust frontend analyze is a stub.
    affected_frontends: [go, rust]
    affected_commands: [analyze]
    status: tracked
    resolution: >
      Add data flow tracking to Go frontend (separate issue). Rust frontend
      deferred until full analyze implementation lands.

  - id: loop-body-states-typescript-only
    description: >
      TypeScript emits `loop_body_states` in execute responses for supported
      canonical counted loops, combining cached `LoopInfo` metadata with
      observed runtime iteration counts to produce ordered per-iteration
      symbolic local snapshots. Go and Rust include the field in protocol
      structs for wire compatibility but do not populate it yet.
    affected_frontends: [go, rust]
    affected_commands: [execute]
    status: tracked
    resolution: >
      Add loop snapshot emission to Go and Rust execute paths with the same
      `loop_id` and zero-based `iteration` contract as TypeScript, or move the
      reconstruction logic into a shared core-side postprocessor.
