# Parity Matrix Schema
#
# This document defines the expected structure of protocol/parity-matrix.yaml,
# the machine-readable parity contract consumed by scripts/validate-parity.py.
#
# str-7jgm.1 is responsible for generating and maintaining parity-matrix.yaml.
# This schema file is the normative reference for that contract.
#
# Validator: python3 scripts/validate-parity.py
# CI task:   npx task parity
#
# ─── Structure ─────────────────────────────────────────────────────────────
#
# schema_version: "<string>"
#   Version of this schema format. Currently "1".
#   Bump when the schema structure changes incompatibly.
#
# protocol_version: "<string>"
#   The protocol version (from protocol/registry.yaml) this matrix was
#   generated against. Informational; the validator does not enforce
#   protocol_version compatibility — it uses the live registry.yaml.
#
# frontends:
#   <frontend-name>:
#     # One entry per frontend. Must match a name known to the validator:
#     #   typescript, go, rust
#     #
#     # required:
#     #   Commands and complex_types that MUST be advertised in the frontend's
#     #   handshake response. Validator exits 1 if any are absent.
#     #
#     # optional:
#     #   Commands and complex_types that MAY be advertised. Validator emits a
#     #   warning (not a failure) if any are absent.
#     #
#     # All capability names must appear in protocol/registry.yaml under
#     # capabilities.command or capabilities.complex_type. The validator will
#     # fail if the matrix references an unregistered capability name.
#     #
#     # handshake and shutdown are mandatory protocol commands and are NOT
#     # listed in capabilities (frontends always handle them); do not include
#     # them in required or optional.
#     #
#     # default_timeout_seconds: <int>
#     #   The frontend's coded default execution timeout in whole seconds.
#     #   Validator fails if the actual constant in source differs.
#     #   Omit to skip the timeout check for this frontend.
#
# ─── Example ────────────────────────────────────────────────────────────────
#
# schema_version: "1"
# protocol_version: "0.1.0"
# frontends:
#   typescript:
#     required:
#       commands:
#         - analyze
#         - execute
#         - instrument
#         - setup
#         - generate
#       complex_types: []
#     optional:
#       commands:
#         - teardown
#       complex_types:
#         - date
#         - date_time
#         - duration
#         - reg_exp
#         - url
#         - big_int
#         - buffer
#         - error
#         - symbol
#     default_timeout_seconds: 15
#
#   go:
#     required:
#       commands:
#         - analyze
#         - execute
#         - instrument
#         - setup
#         - teardown
#         - generate
#       complex_types: []
#     optional:
#       commands: []
#       complex_types:
#         - date
#         - duration
#         - url
#         - reg_exp
#         - ip_address
#         - big_int
#         - rational
#         - big_decimal
#         - error
#     default_timeout_seconds: 5
#
#   rust:
#     required:
#       commands:
#         - analyze
#         - execute
#         - generate
#         - instrument
#         - setup
#         - teardown
#       complex_types: []
#     optional:
#       commands: []
#       complex_types: []
#     default_timeout_seconds: 5
#
# ─── Detector implementation notes ──────────────────────────────────────────
#
# The validator detects capabilities by static analysis of each frontend's
# handler source:
#
# typescript:
#   commands      — SUPPORTED_CAPABILITIES array in shatter-ts/src/handlers.ts
#                   (items without "complex_type:" prefix)
#   complex_types — SUPPORTED_CAPABILITIES array (items with "complex_type:" prefix,
#                   stripping the prefix)
#   timeout       — DEFAULT_EXEC_TIMEOUT_MS constant in shatter-ts/src/executor.ts
#                   (milliseconds ÷ 1000 = seconds)
#
# go:
#   commands      — CommandCapabilities var in shatter-go/protocol/constants.go
#   complex_types — "complex_type:*" string literals in handleHandshake in
#                   shatter-go/protocol/handler.go
#   timeout       — defaultExecTimeout = N * time.Second in
#                   shatter-go/instrument/executor.go
#
# rust:
#   commands      — string literals inside resp.capabilities = Some(vec![...])
#                   in handle_handshake in shatter-rust/src/handler.rs
#   complex_types — "complex_type:*" literals in the same block (stripping prefix)
#   timeout       — DEFAULT_EXEC_TIMEOUT_MS: u64 = NNNN constant in handler.rs
#                   (milliseconds ÷ 1000 = seconds)
