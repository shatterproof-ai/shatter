# Shatter Crypto API Registry
#
# Static mapping of known cryptographic functions for boundary detection.
# Frontends match detected ExternalDependency calls against this registry
# to identify encryption/decryption boundaries.
#
# Fields:
#   language     — "typescript", "go", or "rust"
#   package      — module/package path as reported by frontend analyzers
#   symbol       — function or method name within the package
#   direction    — "encrypt", "decrypt", or "both" (authenticated encryption)
#   param_roles  — maps parameter position (as string key) to role
#   output       — what the return value represents
#
# param_roles values: "algorithm", "key", "data", "iv", "nonce", "tag", "aad"
# output values: "ciphertext", "plaintext", "key", "hash", "signature", "verified"
#
# Users can override or extend this registry via .shatter/crypto-registry.toml

# =============================================================================
# Node.js / TypeScript
# =============================================================================

# --- node:crypto (built-in) ---

[[entries]]
language = "typescript"
package = "crypto"
symbol = "createCipheriv"
direction = "encrypt"
output = "ciphertext"

[entries.param_roles]
"0" = "algorithm"
"1" = "key"
"2" = "iv"

