<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shatter Explore Report</title>
<style>
{% include "includes/style.html" %}
</style>
</head>
<body>
<h1>Shatter Explore Report</h1>
<div class="stat-row">
  <div class="stat"><div class="stat-label">Functions</div><div class="stat-value">{{ fn_count }}</div></div>
  <div class="stat"><div class="stat-label">Paths</div><div class="stat-value">{{ total_paths }}</div></div>
  <div class="stat"><div class="stat-label">Coverage</div><div class="stat-value" style="font-size:16px">{{ cov_bar_html|safe }}</div></div>
</div>
<h2>Functions</h2>
{% for f in fragments %}{{ f|safe }}{% endfor %}
<script>
(function () {
  function activatePath(row) {
    var lines = (row.dataset.lines || '').split(',').filter(Boolean);
    row.classList.add('selected-path');
    lines.forEach(function (ln) {
      var el = document.querySelector('.src-line[data-line="' + ln + '"]');
      if (el) el.classList.add('active-path');
    });
    var first = document.querySelector('.src-line.active-path');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearSelection() {
    document.querySelectorAll('tr.selected-path').forEach(function (r) {
      r.classList.remove('selected-path');
    });
    document.querySelectorAll('.src-line.active-path').forEach(function (el) {
      el.classList.remove('active-path');
    });
  }

  document.querySelectorAll('tr[data-path-index]').forEach(function (row) {
    row.addEventListener('click', function () {
      var isSelected = this.classList.contains('selected-path');
      clearSelection();
      if (!isSelected) activatePath(this);
    });
  });
}());
</script>
</body>
</html>
