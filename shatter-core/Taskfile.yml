version: '3'

tasks:
  build:
    desc: Build shatter-core library
    sources:
      - src/**/*.rs
      - Cargo.toml
      - ../Cargo.lock
      - build.rs
    cmds:
      - cargo build -p shatter-core

  test:
    desc: Run shatter-core tests
    sources:
      - src/**/*.rs
      - tests/**/*.rs
      - Cargo.toml
      - ../Cargo.lock
      - build.rs
      - ../scripts/examples_checkout.py
    cmds:
      - |
        examples_root="$(python3 ../scripts/examples_checkout.py)"
        SHATTER_EXAMPLES_DIR="$examples_root" cargo test -p shatter-core

  test-ignored:
    desc: Run shatter-core tests including slow/ignored tests
    sources:
      - src/**/*.rs
      - tests/**/*.rs
      - Cargo.toml
      - ../Cargo.lock
      - build.rs
    cmds:
      - |
        examples_root="$(python3 ../scripts/examples_checkout.py)"
        # Reuse the prebuilt Go frontend when present (root check-integration
        # deps go:build); the e2e tests fall back to building it otherwise.
        if [ -x "$PWD/../shatter-go/bin/shatter-go" ]; then
          export SHATTER_GO_FRONTEND_BIN="$PWD/../shatter-go/bin/shatter-go"
        fi
        SHATTER_EXAMPLES_DIR="$examples_root" cargo test -p shatter-core -- --include-ignored

  clippy:
    desc: Run clippy on shatter-core
    sources:
      - src/**/*.rs
      - Cargo.toml
      - ../Cargo.lock
      - build.rs
    cmds:
      - cargo clippy -p shatter-core -- -D warnings
